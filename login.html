<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuyNest - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('login image.png');
            background-size: 105% 100%;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            animation: fadeIn 1.5s ease-out;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 40px 35px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            margin-left: auto;
            animation: cardAppear 1s ease-out;
        }
        
        @keyframes cardAppear {
            0% {
                opacity: 0;
                transform: translateX(50px) scale(0.9);
            }
            50% {
                opacity: 0.8;
                transform: translateX(10px) scale(1.02);
            }
            100% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }
        
        .login-content {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            width: 100%;
        }
        
        .welcome-text {
            text-align: center;
            margin-bottom: 8px;
            font-size: 14px;
            color: #8D6E63;
            font-weight: 500;
            width: 100%;
            max-width: 400px;
        }
        
        .login-content h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #5D4037;
            font-size: 28px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        
        .form-group {
            margin-bottom: 20px;
            position: relative;
            width: 100%;
            max-width: 400px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #5D4037;
            font-weight: 600;
            font-size: 14px;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 45px 14px 16px;
            border: 2px solid #8D6E63;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.9);
            color: #5D4037;
        }
        
        .form-group input::placeholder {
            color: rgba(93, 64, 55, 0.5);
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #5D4037;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(141, 110, 99, 0.15);
        }
        
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #8D6E63;
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            transition: color 0.3s;
        }
        
        .password-toggle:hover {
            color: #5D4037;
        }
        
        .login-btn {
            width: 100%;
            max-width: 400px;
            padding: 14px;
            background: linear-gradient(135deg, #8D6E63, #5D4037);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(93, 64, 55, 0.3);
        }
        
        .login-btn:hover {
            background: linear-gradient(135deg, #A1887F, #8D6E63);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(93, 64, 55, 0.4);
        }
        
        .links {
            text-align: center;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 400px;
            align-items: center;
        }
        
        .links a {
            color: #5D4037;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .links a:hover {
            color: #8D6E63;
            text-decoration: underline;
        }
        
        .back-link {
            text-align: center;
            margin-top: 15px;
            width: 100%;
            max-width: 400px;
        }
        
        .back-link a {
            color: #5D4037;
            text-decoration: none;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .back-link a:hover {
            color: #8D6E63;
        }
        
        /* Responsive Styles for All Devices */
        
        /* Small Phones */
        @media (max-width: 480px) {
            .login-card {
                padding: 25px 20px;
                border-radius: 15px;
            }
            
            .login-content h2 {
                font-size: 22px;
            }
            
            .welcome-text {
                font-size: 12px;
            }
            
            .form-group input {
                padding: 12px 40px 12px 12px;
                font-size: 14px;
            }
            
            .login-btn {
                padding: 12px;
                font-size: 14px;
            }
            
            .links a {
                font-size: 12px;
            }
            
            .back-link a {
                font-size: 11px;
            }
            
            .password-toggle {
                right: 10px;
                font-size: 14px;
            }
        }
        
        /* Medium Phones */
        @media (min-width: 481px) and (max-width: 768px) {
            .login-card {
                padding: 30px 25px;
                max-width: 380px;
            }
            
            .login-content h2 {
                font-size: 24px;
            }
            
            .form-group input {
                padding: 13px 42px 13px 14px;
                font-size: 14px;
            }
        }
        
        /* Tablets */
        @media (min-width: 769px) and (max-width: 1024px) {
            .login-card {
                max-width: 400px;
                padding: 35px 30px;
            }
            
            .login-content h2 {
                font-size: 26px;
            }
        }
        
        /* Small Laptops */
        @media (min-width: 1025px) and (max-width: 1440px) {
            .login-card {
                max-width: 420px;
            }
        }
        
        /* Large Screens */
        @media (min-width: 1441px) {
            .login-card {
                max-width: 450px;
                padding: 45px 40px;
            }
            
            .login-content h2 {
                font-size: 32px;
            }
            
            .form-group input {
                padding: 16px 48px 16px 18px;
                font-size: 16px;
            }
            
            .login-btn {
                padding: 16px;
                font-size: 17px;
            }
        }
        
        /* Landscape Mobile */
        @media (max-height: 500px) and (orientation: landscape) {
            .login-card {
                padding: 20px 25px;
            }
            
            .login-content h2 {
                margin-bottom: 20px;
                font-size: 20px;
            }
            
            .form-group {
                margin-bottom: 12px;
            }
            
            .login-btn {
                margin-top: 5px;
                padding: 10px;
            }
            
            .links {
                margin-top: 12px;
            }
            
            .back-link {
                margin-top: 10px;
            }
        }
        
        /* High DPI Screens */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            .form-group input {
                image-rendering: -webkit-optimize-contrast;
            }
        }
    </style>
</head>
<body>
    <div class="login-content">
        <div class="login-card">
            <p class="welcome-text">Welcome to</p>
            <h2>BuyNest</h2>
            <form>
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="sanwal929@gmail.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="login-btn" onclick="handleLogin()">Login</button>
            </form>
            <div class="links">
                <a href="forget.html">Forgot Password?</a>
                <a href="signup.html">Don't have an account? Sign Up</a>
            </div>
            <div class="back-link">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back</a>
            </div>
        </div>
    </div>
    
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }
        
        function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (email && password) {
                window.location.href = 'home.html';
            } else {
                alert('Please enter both email and password');
            }
        }
    </script>
</body>
</html>
